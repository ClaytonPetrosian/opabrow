appId: com.opabrow.app
productName: opabrow
copyright: Copyright © 2026 opabrow contributors
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  target: nsis
  icon: build/icon.png
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}
mac:
  category: public.app-category.utilities
  icon: build/icon.icns
  # Direct-download releases must be signed. This prevents accidental unsigned DMGs.
  forceCodeSigning: true
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}
  # The release workflow provides App Store Connect API-key credentials for notarization.
  notarize: true
  hardenedRuntime: true
  gatekeeperAssess: false
  extendInfo:
    NSHumanReadableCopyright: Copyright © 2026 opabrow contributors.
    LSApplicationCategoryType: public.app-category.utilities
    CFBundleURLTypes:
      - CFBundleURLName: opabrow.url
        CFBundleURLSchemes:
          - opabrow
    NSAppTransportSecurity:
      NSAllowsArbitraryLoads: true
  entitlements: build/entitlements.direct.plist
  entitlementsInherit: build/entitlements.direct.plist
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
linux:
  target: AppImage
  icon: build/icon.png
  artifactName: ${productName}-${version}-${arch}.${ext}
publish: null
