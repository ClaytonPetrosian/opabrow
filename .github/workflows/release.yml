name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            os: macos-14
            command: package:mac:arm64
            artifact: macos-arm64
            files: dist/*.dmg
          - label: macOS Intel
            os: macos-14
            command: package:mac:x64
            artifact: macos-x64
            files: dist/*.dmg
          - label: Windows x64
            os: windows-latest
            command: package:win:x64
            artifact: windows-x64
            files: dist/*.exe
          - label: Linux x64
            os: ubuntu-latest
            command: package:linux:x64
            artifact: linux-x64
            files: dist/*.AppImage

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify types
        run: pnpm typecheck
      - name: Prepare signed macOS release
        if: runner.os == 'macOS'
        shell: bash
        env:
          RELEASE_MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          RELEASE_MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          RELEASE_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          RELEASE_APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          RELEASE_APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [[ -z "$RELEASE_MAC_CSC_LINK" || -z "$RELEASE_MAC_CSC_KEY_PASSWORD" ]]; then
            echo "::error::macOS releases require a Developer ID Application certificate in MAC_CSC_LINK and its password in MAC_CSC_KEY_PASSWORD."
            exit 1
          fi

          if [[ -z "$RELEASE_APPLE_API_KEY" || -z "$RELEASE_APPLE_API_KEY_ID" || -z "$RELEASE_APPLE_API_ISSUER" ]]; then
            echo "::error::macOS releases require Apple notarization credentials: APPLE_API_KEY, APPLE_API_KEY_ID, and APPLE_API_ISSUER."
            exit 1
          fi

          key_path="$RUNNER_TEMP/AuthKey_${RELEASE_APPLE_API_KEY_ID}.p8"
          printf '%s' "$RELEASE_APPLE_API_KEY" > "$key_path"
          chmod 600 "$key_path"

          {
            echo "APPLE_API_KEY=$key_path"
            echo "APPLE_API_KEY_ID=$RELEASE_APPLE_API_KEY_ID"
            echo "APPLE_API_ISSUER=$RELEASE_APPLE_API_ISSUER"
          } >> "$GITHUB_ENV"
      - name: Package application
        shell: bash
        run: |
          if [[ -n "$RELEASE_MAC_CSC_LINK" ]]; then
            export CSC_LINK="$RELEASE_MAC_CSC_LINK"
            export CSC_KEY_PASSWORD="$RELEASE_MAC_CSC_KEY_PASSWORD"
          fi

          if [[ -n "$RELEASE_WIN_CSC_LINK" ]]; then
            export WIN_CSC_LINK="$RELEASE_WIN_CSC_LINK"
            export WIN_CSC_KEY_PASSWORD="$RELEASE_WIN_CSC_KEY_PASSWORD"
          fi

          pnpm ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          RELEASE_MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          RELEASE_MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          RELEASE_WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          RELEASE_WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Generate checksums
        working-directory: release-artifacts
        run: sha256sum * > SHA256SUMS.txt
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-artifacts/* --clobber
          else
            gh release create "$TAG" release-artifacts/* --title "opabrow $TAG" --generate-notes
          fi
